<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4,320N｜5日間のお世話</title>
  <style>
    :root{
      --bg1:#f7edff;
      --bg2:#e6f6ff;
      --bg3:#fff8df;
      --ink:#3e3155;
      --muted:#736681;
      --card:rgba(255,255,255,.82);
      --line:rgba(117,96,150,.18);
      --pink:#ff89c2;
      --blue:#76c9ff;
      --purple:#b88cff;
      --yellow:#ffd76b;
      --green:#9be66f;
      --shadow:0 18px 48px rgba(79, 52, 118, .16);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Hiragino Sans","Yu Gothic",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,.92) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,.75) 0 2px, transparent 3px),
        radial-gradient(circle at 40% 86%, rgba(255,255,255,.82) 0 2px, transparent 3px),
        linear-gradient(135deg,var(--bg1),var(--bg2) 46%,var(--bg3));
      min-height:100%;
      overflow-x:hidden;
    }
    body::before,body::after{
      content:"";position:fixed;inset:auto;pointer-events:none;z-index:-1;border-radius:999px;filter:blur(1px);
    }
    body::before{width:42vw;height:42vw;left:-10vw;top:12vh;background:rgba(255,137,194,.23)}
    body::after{width:46vw;height:46vw;right:-12vw;bottom:-12vh;background:rgba(118,201,255,.25)}
    .app{width:min(980px,100%);margin:0 auto;padding:18px 14px 80px}
    .topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:10px 0 14px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.03em}
    .brand .logo{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,#fff,var(--pink));box-shadow:var(--shadow);display:grid;place-items:center}
    .small{font-size:13px;color:var(--muted);line-height:1.65}
    .screen{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(18px,4vw,36px);backdrop-filter:blur(16px);min-height:72vh;position:relative;overflow:hidden}
    .screen::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 0%, rgba(255,255,255,.6), transparent 32%);pointer-events:none}
    .screen > *{position:relative}
    h1{font-size:clamp(28px,6vw,48px);line-height:1.15;margin:0 0 14px;letter-spacing:.02em}
    h2{font-size:clamp(22px,4vw,34px);line-height:1.2;margin:0 0 16px}
    h3{font-size:20px;margin:22px 0 10px}
    p{line-height:1.85;margin:10px 0;color:#483a60}
    .lead{font-size:clamp(16px,2.3vw,20px);color:#53446a}
    .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
    .center{text-align:center}.right{text-align:right}
    .grid{display:grid;gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    @media (max-width:720px){.grid.two,.grid.three{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.screen{min-height:70vh}}
    button,.btn{
      appearance:none;border:0;border-radius:999px;padding:14px 20px;min-height:48px;background:#fff;color:var(--ink);font-weight:700;box-shadow:0 9px 22px rgba(79,52,118,.11);cursor:pointer;transition:.18s transform,.18s box-shadow,.18s opacity,.18s background;display:inline-flex;justify-content:center;align-items:center;gap:8px;text-decoration:none;font-size:15px;
    }
    button:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(79,52,118,.15)}
    button.primary{background:linear-gradient(135deg,#fff,#ffe5f2 45%,#e7f6ff);border:1px solid rgba(255,255,255,.75)}
    button.accent{background:linear-gradient(135deg,#fff7cc,#ffd76b);}
    button.soft{background:rgba(255,255,255,.65);border:1px solid var(--line)}
    button.dangerless{background:linear-gradient(135deg,#eef4ff,#fff);}
    button:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none}
    input[type="text"]{width:100%;border:1px solid var(--line);border-radius:20px;padding:15px 16px;font-size:17px;color:var(--ink);background:rgba(255,255,255,.78);outline:none}
    input[type="checkbox"]{width:20px;height:20px;accent-color:#a982ff;flex:none}
    .checklist{display:grid;gap:11px;margin:18px 0}.checkitem{display:flex;gap:11px;align-items:flex-start;background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:18px;padding:12px 13px;line-height:1.55}
    .pill{border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.65);border:1px solid var(--line);font-size:13px;color:var(--muted)}
    .card{background:rgba(255,255,255,.62);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 8px 20px rgba(79,52,118,.07)}
    .speech-bubble{position:relative;background:rgba(255,255,255,.86);border:2px solid rgba(255,137,194,.35);border-radius:24px;padding:16px 18px;margin:14px 0 18px;box-shadow:0 12px 28px rgba(79,52,118,.10);text-align:left}
    .speech-bubble::before{content:"";position:absolute;left:34px;top:-10px;width:18px;height:18px;background:rgba(255,255,255,.86);border-left:2px solid rgba(255,137,194,.35);border-top:2px solid rgba(255,137,194,.35);transform:rotate(45deg)}
    .speech-bubble p{font-size:clamp(17px,2.4vw,22px);line-height:1.65;margin:0;color:#3f3157;font-weight:700}
    .speech-label{display:inline-block;margin-bottom:8px;padding:4px 10px;border-radius:999px;background:linear-gradient(135deg,#ffe5f2,#eef7ff);font-size:12px;font-weight:800;color:#7b5c96;letter-spacing:.04em}
    .speech-bubble.memory-note{border-color:rgba(255,215,107,.65);background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,248,223,.9))}
    .speech-bubble.memory-note .speech-label{background:linear-gradient(135deg,#fff3b8,#ffe5f2);color:#7d6120}
    .language-card{min-height:120px;font-size:22px}
    .macaron-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:22px}@media(max-width:720px){.macaron-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .macaron-card{border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.52);border-radius:26px;padding:18px;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;box-shadow:var(--shadow);transition:.18s transform,.18s box-shadow}
    .macaron-card:hover{transform:translateY(-4px) scale(1.01)}

    /* ===========================================================
       GIFT START 2026-07
       マカロン型プレゼント画像 → ランダムにマカロンが出てくる
       画像ファイルは public/assets/macarons/macaron_gift_box.png に置きます。
       =========================================================== */
    .gift-stage{
      min-height:390px;
      display:grid;
      place-items:center;
      gap:18px;
      padding:18px 0;
      position:relative;
    }
    .gift-open-scene{
      position:relative;
      width:min(360px,82vw);
      min-height:300px;
      display:grid;
      place-items:center;
      margin:0 auto;
    }
    .gift-box-img{
      width:min(330px,80vw);
      max-height:330px;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 26px 34px rgba(23,16,70,.30));
      animation:giftImageFloat 3.2s ease-in-out infinite;
      background:transparent !important;
      border:none !important;
      box-shadow:none !important;
      -webkit-mask-image:none !important;
      mask-image:none !important;
    }
    .gift-box-img.opened{
      animation:giftImageOpen 1.05s ease both;
    }
    .gift-emerging-macaron{
      position:absolute;
      left:50%;
      top:42%;
      transform:translate(-50%,-50%) scale(.62);
      opacity:0;
      z-index:3;
      pointer-events:none;
      animation:macaronEmergesFromGift 1.4s ease-out forwards;
      filter:drop-shadow(0 16px 18px rgba(23,16,70,.24));
    }
    .gift-emerging-macaron .macaron-img.large{
      width:170px;
      height:132px;
      margin:0 auto;
      animation:none;
    }
    .gift-emerging-macaron .macaron{
      animation:none !important;
    }
    .gift-light{
      position:absolute;
      left:50%;
      top:44%;
      width:190px;
      height:190px;
      transform:translate(-50%,-50%) scale(.6);
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,244,168,.56) 28%, rgba(255,137,194,.22) 52%, transparent 72%);
      opacity:0;
      z-index:2;
      pointer-events:none;
      animation:giftLightPop 1.2s ease-out forwards;
    }
    .gift-result-note{
      max-width:680px;
      margin:10px auto 0;
      padding:12px 16px;
      border-radius:22px;
      background:rgba(255,255,255,.68);
      color:var(--ink) !important;
      text-shadow:none !important;
      border:1px solid rgba(255,255,255,.58);
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    .random-macaron-stage{
      min-height:360px;
      display:grid;
      place-items:center;
      gap:12px;
    }
    .random-macaron-card{
      display:inline-grid;
      place-items:center;
      padding:18px 24px;
      border-radius:32px;
      background:rgba(255,255,255,.62);
      border:1px solid rgba(255,255,255,.60);
      box-shadow:0 18px 38px rgba(25,18,65,.18);
      -webkit-backdrop-filter:blur(10px);
      backdrop-filter:blur(10px);
    }
    @keyframes giftImageFloat{
      0%,100%{transform:translateY(0) rotate(-1deg)}
      50%{transform:translateY(-12px) rotate(1deg)}
    }
    @keyframes giftImageOpen{
      0%{transform:translateY(0) scale(1) rotate(0);filter:drop-shadow(0 26px 34px rgba(23,16,70,.30)) brightness(1)}
      45%{transform:translateY(-8px) scale(1.05) rotate(-2deg);filter:drop-shadow(0 28px 38px rgba(23,16,70,.30)) brightness(1.22)}
      100%{transform:translateY(18px) scale(.88) rotate(2deg);opacity:.42;filter:drop-shadow(0 20px 24px rgba(23,16,70,.16)) blur(1px) brightness(1.2)}
    }
    @keyframes macaronEmergesFromGift{
      0%{opacity:0;transform:translate(-50%,10%) scale(.48) rotate(-8deg);filter:blur(6px) brightness(1.4)}
      42%{opacity:1;transform:translate(-50%,-86%) scale(.95) rotate(4deg);filter:blur(0) brightness(1.12)}
      74%{opacity:1;transform:translate(-50%,-116%) scale(1.05) rotate(-2deg);filter:blur(0) brightness(1)}
      100%{opacity:1;transform:translate(-50%,-104%) scale(1) rotate(0);filter:blur(0) brightness(1)}
    }
    @keyframes giftLightPop{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.35)}
      38%{opacity:1;transform:translate(-50%,-64%) scale(1.1)}
      100%{opacity:.42;transform:translate(-50%,-72%) scale(1.45)}
    }

    .macaron{width:122px;height:80px;border-radius:56% 56% 48% 48%;position:relative;filter:drop-shadow(0 13px 12px rgba(64,42,90,.16));background:var(--macaron);box-shadow:inset 0 14px 20px rgba(255,255,255,.55), inset 0 -14px 20px rgba(80,40,110,.12)}
    .macaron::before{content:"";position:absolute;left:8px;right:8px;top:34px;height:16px;border-radius:999px;background:rgba(255,255,255,.82);box-shadow:0 0 10px rgba(255,255,255,.4)}
    .macaron::after{content:"✦";position:absolute;right:22px;top:8px;color:rgba(255,255,255,.9);font-size:22px;text-shadow:0 0 8px currentColor}

    .macaron-img{
      width:150px;
      height:112px;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 13px 12px rgba(64,42,90,.16));
      animation:floaty 3.2s ease-in-out infinite;
    }
    .macaron-img.large{
      width:220px;
      height:170px;
      margin:28px auto 18px;
      transform:none;
    }
    .pet-stage{display:grid;place-items:center;min-height:330px;margin:12px 0;position:relative}
    .pet-img{max-width:min(440px,85vw);max-height:420px;width:auto;height:auto;object-fit:contain;filter:drop-shadow(0 22px 22px rgba(69,44,98,.18));animation:floaty 3.2s ease-in-out infinite}
    .pet-img.smallish{max-width:min(340px,78vw);max-height:310px}.pet-img.sleep{animation:breath 3.4s ease-in-out infinite}.pet-img.sad{animation:none}.pet-img.birth{animation:birthPop 1.4s ease both}.pet-img.fadeout{animation:fadeToLight 4.6s ease-in forwards}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.015)}}
    @keyframes birthPop{0%{opacity:0;transform:scale(.5) translateY(30px);filter:blur(8px)}60%{opacity:1;transform:scale(1.06) translateY(-8px)}100%{transform:scale(1)}}
    @keyframes fadeToLight{0%{opacity:1;transform:scale(1);filter:drop-shadow(0 22px 22px rgba(69,44,98,.18))}65%{opacity:.35;transform:scale(.96);filter:blur(2px) brightness(1.2)}100%{opacity:0;transform:scale(.55);filter:blur(14px) brightness(2.4)}}


    /* ===========================================================
       キャラクター別の通常時アニメーション
       happy状態だけに付与し、sleep/sad/birth/fadeoutの演出は崩さない。
       =========================================================== */
    .pet-motion-rabbit{
      animation:rabbitOneTwoThreeHop 3.8s ease-in-out infinite;
      transform-origin:50% 92%;
      will-change:transform;
    }
    .pet-motion-kangaroo{
      animation:kangarooBoingPyoko 2.9s cubic-bezier(.25,.9,.3,1) infinite;
      transform-origin:50% 95%;
      will-change:transform;
    }
    .pet-motion-penguin{
      animation:penguinChokoFromRight 6.2s steps(6,end) infinite;
      transform-origin:50% 95%;
      will-change:transform;
    }
    .pet-motion-seal{
      animation:sealSlowKurukuru 12s ease-in-out infinite;
      transform-origin:50% 55%;
      will-change:transform;
    }
    .pet-motion-lizard{
      animation:lizardKyoroKyoro 2.8s ease-in-out infinite;
      transform-origin:50% 75%;
      will-change:transform;
    }
    .pet-motion-cat{
      animation:catRestlessRunSpin 5.4s ease-in-out infinite;
      transform-origin:50% 88%;
      will-change:transform;
    }
    @keyframes rabbitOneTwoThreeHop{
      0%,26%{transform:translateY(0) rotate(0)}
      31%{transform:translateY(-30px) rotate(-3deg)}
      37%{transform:translateY(0) rotate(2deg)}
      43%,68%{transform:translateY(0) rotate(0)}
      73%{transform:translateY(-30px) rotate(3deg)}
      79%{transform:translateY(0) rotate(-2deg)}
      100%{transform:translateY(0) rotate(0)}
    }
    @keyframes kangarooBoingPyoko{
      0%,100%{transform:translateY(0) scale(1) rotate(0)}
      10%{transform:translateY(4px) scaleX(1.05) scaleY(.92)}
      24%{transform:translateY(-58px) scaleX(.92) scaleY(1.12) rotate(-3deg)}
      36%{transform:translateY(0) scaleX(1.08) scaleY(.9) rotate(2deg)}
      48%{transform:translateY(-16px) scale(1) rotate(1deg)}
      58%{transform:translateY(0) scale(1) rotate(0)}
      72%{transform:translateY(-46px) scaleX(.95) scaleY(1.08) rotate(3deg)}
      84%{transform:translateY(0) scaleX(1.04) scaleY(.94) rotate(-1deg)}
    }
    @keyframes penguinChokoFromRight{
      0%{transform:translateX(92px) translateY(0) rotate(4deg)}
      16%{transform:translateX(64px) translateY(-4px) rotate(-5deg)}
      32%{transform:translateX(36px) translateY(0) rotate(5deg)}
      48%{transform:translateX(8px) translateY(-4px) rotate(-4deg)}
      64%{transform:translateX(-20px) translateY(0) rotate(4deg)}
      80%{transform:translateX(-48px) translateY(-3px) rotate(-3deg)}
      100%{transform:translateX(-76px) translateY(0) rotate(3deg)}
    }
    @keyframes sealSlowKurukuru{
      0%{transform:rotate(0deg) scale(1)}
      20%{transform:rotate(360deg) scale(1.01)}
      40%{transform:rotate(720deg) scale(1)}
      65%{transform:rotate(720deg) scale(1)}
      100%{transform:rotate(1080deg) scale(1.01)}
    }
    @keyframes lizardKyoroKyoro{
      0%,100%{transform:translateX(0) rotate(0deg) scaleX(1)}
      18%{transform:translateX(4px) rotate(3deg) scaleX(1)}
      36%{transform:translateX(-4px) rotate(-3deg) scaleX(-1)}
      54%{transform:translateX(-4px) rotate(-2deg) scaleX(-1)}
      72%{transform:translateX(4px) rotate(3deg) scaleX(1)}
    }
    @keyframes catRestlessRunSpin{
      0%{transform:translateX(-92px) translateY(0) rotate(0deg)}
      18%{transform:translateX(70px) translateY(-8px) rotate(4deg)}
      31%{transform:translateX(92px) translateY(0) rotate(0deg)}
      44%{transform:translateX(36px) translateY(-14px) rotate(160deg)}
      56%{transform:translateX(-12px) translateY(0) rotate(360deg)}
      72%{transform:translateX(-86px) translateY(-6px) rotate(355deg)}
      88%{transform:translateX(18px) translateY(0) rotate(370deg)}
      100%{transform:translateX(-92px) translateY(0) rotate(360deg)}
    }
    /* 実装確認用：OS側の「視差効果を減らす」設定が入っていても、
       このキャラクター動作は確認できるようにしています。 */
    .char-fallback{width:260px;height:260px;border-radius:50%;background:linear-gradient(135deg,#fff,#e9ddff);display:grid;place-items:center;font-size:64px;box-shadow:var(--shadow)}
    .char-fallback.smallish{width:220px;height:220px;font-size:58px}
    .char-fallback.sleep{animation:breath 3.4s ease-in-out infinite}
    .char-fallback.sad{animation:none}
    .char-fallback.birth{animation:birthPop 1.4s ease both}
    .char-fallback.fadeout{animation:fadeToLight 4.6s ease-in forwards}
    .hidden{display:none!important}
    .sparkle{position:absolute;width:9px;height:9px;background:#fff;border-radius:50%;box-shadow:0 0 12px #fff;animation:spark 2.3s linear infinite}.sparkle:nth-child(2){left:18%;top:25%;animation-delay:.3s}.sparkle:nth-child(3){left:78%;top:22%;animation-delay:.9s}.sparkle:nth-child(4){left:66%;top:76%;animation-delay:1.2s}.sparkle:nth-child(5){left:32%;top:73%;animation-delay:1.6s}
    @keyframes spark{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.25)}}
    .meter{width:100%;height:18px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid var(--line);overflow:hidden}.meter-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#ff9ac8,#ffd76b,#9be66f);transition:.3s width}
    .home-layout{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:center}@media(max-width:860px){.home-layout{grid-template-columns:1fr}.home-layout .right{text-align:center}}
    .menu-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.menu-grid button{min-height:72px;border-radius:24px;flex-direction:column;font-size:16px}.menu-icon{font-size:28px}
    .choice{padding:24px;border-radius:28px;background:rgba(255,255,255,.7);border:1px solid var(--line);font-size:22px;min-height:120px;display:grid;place-items:center}
    .poop-area,.petting-area{min-height:420px;position:relative;background:rgba(255,255,255,.46);border:1px dashed rgba(93,70,126,.25);border-radius:28px;overflow:hidden;touch-action:none}
    .poop{position:absolute;font-size:42px;cursor:pointer;filter:drop-shadow(0 10px 8px rgba(80,50,90,.13));transition:.16s transform,.16s opacity}.poop:hover{transform:scale(1.08) rotate(-4deg)}


    /* ===========================================================
       うんち掃除ミニゲームを少し難しくする
       動く💩の中から、指定された色のリングだけをタップします。
       =========================================================== */
    .clean-target-card{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin:10px auto 14px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.70);
      border:1px solid rgba(255,255,255,.58);
      color:var(--ink);
      font-weight:800;
      box-shadow:0 10px 24px rgba(31,19,70,.12);
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    .clean-color-dot{
      width:20px;
      height:20px;
      border-radius:999px;
      background:var(--target-color,#ffd76b);
      box-shadow:0 0 14px var(--target-color,#ffd76b);
      border:2px solid rgba(255,255,255,.86);
    }
    .clean-progress{
      display:inline-block;
      margin-top:12px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.62);
      color:var(--ink) !important;
      text-shadow:none !important;
      font-weight:800;
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    .moving-poop{
      width:58px;
      height:58px;
      display:grid;
      place-items:center;
      border-radius:999px;
      border:4px solid var(--ring,#ffd76b);
      background:rgba(255,255,255,.66);
      box-shadow:0 0 18px color-mix(in srgb, var(--ring,#ffd76b) 65%, transparent), 0 10px 18px rgba(25,18,65,.18);
      animation:poopDrift var(--dur,2.6s) ease-in-out infinite alternate;
      user-select:none;
    }
    .moving-poop:hover{
      transform:none;
    }
    .moving-poop.cleaned{
      opacity:0 !important;
      pointer-events:none !important;
      animation:none !important;
    }
    .moving-poop.wrong{
      animation:poopWrong .32s ease-in-out 1 !important;
    }
    @keyframes poopDrift{
      from{transform:translate(0,0) rotate(-8deg) scale(1)}
      to{transform:translate(var(--dx,42px),var(--dy,-28px)) rotate(10deg) scale(1.05)}
    }

    /* ===========================================================
       画面全体の背景
       public/space_background.png を public フォルダに入れて使用します。
       背景は body に固定し、キャラクター画像とは一緒に動かしません。
       =========================================================== */
    html,
    body{
      min-height:100%;
    }
    body{
      background-image:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.08)),
        url("public/space_background.png") !important;
      background-size:cover !important;
      background-position:center center !important;
      background-repeat:no-repeat !important;
      background-attachment:fixed !important;
    }
    body::before,
    body::after{
      display:none !important;
    }

    /* 大きな白いカードで宇宙背景が隠れないように、カードを半透明にします。 */
    .screen{
      background:rgba(255,255,255,.48) !important;
      border:1px solid rgba(255,255,255,.50);
      backdrop-filter:blur(8px);
    }
    .screen::before{
      display:none !important;
    }

    /* キャラクターの後ろに白い四角背景を出さない */

    .character-stage,
    .character-area,
    .character-box,

      background:transparent !important;
      box-shadow:none !important;
    }
    .pet-img,
    .macaron-img{
      background:transparent !important;
    }


    /* ===========================================================
       キャラクターを少し小さく表示する調整
       大きくなりすぎないように、画面の余白を残します。
       =========================================================== */
    .pet-stage{
      min-height:270px !important;
    }
    .pet-img{

      max-width:min(240px,62vw) !important;

    }
    .char-fallback{
      width:210px !important;

      font-size:54px !important;
    }

      width:180px !important;
      height:180px !important;
      font-size:48px !important;
    }

      min-height:250px !important;

    /* ===========================================================
       最終調整：宇宙背景を public/space_background.png から表示
       画面の白いカードを透かして、宇宙背景が見えるようにする。
       =========================================================== */
    html,
    body{
      min-height:100%;
    }
    body{
      background-image:
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),

      background-position:center center !important;
      background-repeat:no-repeat !important;
      background-attachment:fixed !important;
    }
    body::before,
    body::after{
      display:none !important;
    }
    .screen{
      background:
        linear-gradient(135deg, rgba(255,255,255,.46), rgba(255,255,255,.34)),
        url("public/space_background.png") center center / cover no-repeat !important;
      border:1px solid rgba(255,255,255,.48) !important;
      box-shadow:0 18px 48px rgba(22, 16, 55, .18) !important;

      display:none !important;

    /* ===========================================================
       最終調整：キャラクターの周りの四角を出しにくくする
       画像表示エリア自体は完全に透明にする。
       ※キャラPNGに市松模様が焼き込まれている場合は、
         画像ファイルを透過PNGに差し替える必要があります。
       =========================================================== */
    .pet-stage,
    .character-stage,
    .character-area,
    .character-box,
    .pet-area{
      background:transparent !important;
      box-shadow:none !important;
      border:none !important;
    }

      border:none !important;

    }

    .pet-img:not(.fadeout){
      -webkit-mask-image:radial-gradient(ellipse 62% 68% at 50% 53%, #000 68%, rgba(0,0,0,.96) 78%, transparent 98%);
      mask-image:radial-gradient(ellipse 62% 68% at 50% 53%, #000 68%, rgba(0,0,0,.96) 78%, transparent 98%);
    }


    /* ===========================================================
       透過の最終調整
       キャラクターの後ろにある「白い板」や、画面カードごと動いて見える感じを消します。
       背景画像は body の public/space_background.png だけを使い、
       .screen や .pet-stage 側には背景を持たせません。
       =========================================================== */

    /* 大きな画面カードの背景を消す。

    .screen{
      background:transparent !important;
      background-image:none !important;
      background-color:transparent !important;
      -webkit-backdrop-filter:none !important;
      backdrop-filter:none !important;

    .pet-img:not(.fadeout){

let gameState = loadState();
let event_log = loadLog();
let countdownTimer = null;

function now(){ return new Date().toISOString(); }

function localDateString(date=new Date()){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function parseLocalDate(dateStr){
  const [y,m,d] = String(dateStr || "").split("-").map(Number);
  if(!y || !m || !d) return null;
  return new Date(y, m-1, d);
}
function daysBetweenLocal(startDateStr, endDateStr){
  const start = parseLocalDate(startDateStr);
  const end = parseLocalDate(endDateStr);
  if(!start || !end) return 0;
  const ms = end.getTime() - start.getTime();
  return Math.floor(ms / 86400000);
}
function minutesBetweenIso(a,b){
  const start = Date.parse(a || "");
  const end = Date.parse(b || "");
  if(!Number.isFinite(start) || !Number.isFinite(end)) return null;
  return Math.max(0, Math.round((end - start) / 60000));
}
function localDateTimeLabel(iso){
  const d = new Date(iso || now());
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleString(gameState.language === "en" ? "en-US" : gameState.language === "zh-CN" ? "zh-CN" : "ja-JP", {
    year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"
  });
}
function nextLocalCareBoundary(from=new Date(), hour=CARE_DAY_START_HOUR){
  const boundary = new Date(from.getFullYear(), from.getMonth(), from.getDate(), Number(hour)||0, 0, 0, 0);
  if(from.getTime() >= boundary.getTime()) boundary.setDate(boundary.getDate() + 1);
  return boundary;
}
function careBoundaryTime(date, hour=CARE_DAY_START_HOUR){
  const d = new Date(date);
  const boundary = new Date(d.getFullYear(), d.getMonth(), d.getDate(), Number(hour)||0, 0, 0, 0);
  if(d.getTime() < boundary.getTime()) boundary.setDate(boundary.getDate() - 1);
  return boundary.getTime();
}
function getScheduleConfig(){
  const urlMode = ADMIN_MODE ? (URL_PARAMS.get("careStartMode") || "") : "";
  const urlAdvance = ADMIN_MODE ? (URL_PARAMS.get("dayMode") || "") : "";
  const urlHour = ADMIN_MODE ? Number(URL_PARAMS.get("careHour")) : NaN;
  const urlStart = ADMIN_MODE ? (URL_PARAMS.get("careStartAt") || URL_PARAMS.get("startAt") || "") : "";
  const startMode = ["first_access","next_care_hour","fixed_datetime"].includes(urlMode) ? urlMode : CARE_START_MODE;
  const dayAdvanceMode = ["rolling_24h","daily_start_hour"].includes(urlAdvance) ? urlAdvance : CARE_DAY_ADVANCE_MODE;
  const hour = Number.isFinite(urlHour) && urlHour >= 0 && urlHour <= 23 ? urlHour : CARE_DAY_START_HOUR;
  const fixedAt = urlStart || FIXED_CARE_START_AT;
  return { startMode, dayAdvanceMode, hour, fixedAt };
}
function resolveCareStartAt(){
  const cfg = getScheduleConfig();
  const fixedMs = Date.parse(cfg.fixedAt || "");
  if(cfg.startMode === "fixed_datetime" && Number.isFinite(fixedMs)) return new Date(fixedMs).toISOString();
  if(cfg.startMode === "next_care_hour") return nextLocalCareBoundary(new Date(), cfg.hour).toISOString();
  return now();
}
function isCareStartInFuture(){
  const ms = Date.parse(gameState.care_start_at || "");
  return Number.isFinite(ms) && Date.now() < ms;
}
function secondsUntilCareStart(){
  const ms = Date.parse(gameState.care_start_at || "");
  if(!Number.isFinite(ms)) return 0;
  return Math.max(0, Math.ceil((ms - Date.now()) / 1000));
}
function remainingTimeText(seconds){
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if(h > 0) return `${h}時間${String(m).padStart(2,"0")}分`;
  if(m > 0) return `${m}分${String(s).padStart(2,"0")}秒`;
  return `${s}秒`;
}
function nextCareOpenAt(day){
  const startMs = Date.parse(gameState.care_start_at || gameState.start_time || now());
  if(!Number.isFinite(startMs)) return null;
  const targetDay = Number(day || (Number(gameState.day || 1) + 1));
  const mode = gameState.care_day_advance_mode || getScheduleConfig().dayAdvanceMode;
  const hour = Number(gameState.care_day_start_hour ?? getScheduleConfig().hour);
  if(mode === "rolling_24h") return new Date(startMs + (targetDay - 1) * 86400000);
  const firstBoundary = careBoundaryTime(new Date(startMs), hour);
  return new Date(firstBoundary + (targetDay - 1) * 86400000);
}
function nextCareOpenText(day){
  const d = nextCareOpenAt(day);
  if(!d) return "";
  return `${t("nextCareTime")}：${localDateTimeLabel(d.toISOString())}`;
}
function getMaxDayForProgress(){
  return gameState.optional_continuation ? 999 : 5;
}
function expectedDayByCalendar(){
  const startIso = gameState.care_start_at || gameState.start_time || now();
  const startMs = Date.parse(startIso);
  if(!Number.isFinite(startMs) || Date.now() < startMs) return 1;
  const mode = gameState.care_day_advance_mode || getScheduleConfig().dayAdvanceMode;
  const hour = Number(gameState.care_day_start_hour ?? getScheduleConfig().hour);
  let raw = 1;
  if(mode === "rolling_24h"){
    raw = Math.floor((Date.now() - startMs) / 86400000) + 1;
  }else{
    const startBoundary = careBoundaryTime(new Date(startMs), hour);
    const nowBoundary = careBoundaryTime(new Date(), hour);
    raw = Math.floor((nowBoundary - startBoundary) / 86400000) + 1;
  }
  return Math.min(getMaxDayForProgress(), Math.max(1, raw));
}
function setDayStartDate(day){
  gameState.dayStartDates = gameState.dayStartDates || {};
  const key = String(day || gameState.day || 1);
  gameState.dayStartDates[key] = gameState.dayStartDates[key] || localDateString();
}
function canAutoAdvanceFromDay(day){
  // 3日目の後は、消失・再生成の体験を必ず通るため、自動で4日目に飛ばさない。
  if(Number(day) === 3 && !gameState.regenerated) return false;
  if(Number(day) >= 5 && !gameState.optional_continuation) return false;
  return true;
}
function autoAdvanceIfNewDay(){
  if(!REAL_DAY_MODE || DEV_MODE) return false;
  if(!gameState.consent || !gameState.character_id) return false;
  const current = Number(gameState.day || 1);
  const expected = expectedDayByCalendar();
  if(expected <= current) return false;
  if(!gameState.dayComplete?.[String(current)]) return false;
  if(!canAutoAdvanceFromDay(current)) return false;

  const nextDay = Math.min(expected, current + 1);
  gameState.day = nextDay;
  setDayStartDate(nextDay);
  gameState.screen = "09_day_home";
  logEvent("auto_advance_day_by_date", {
    from_day:current,
    to_day:nextDay,
    expected_day:expected,
    local_date:localDateString(),
    start_local_date:gameState.start_local_date || "",
    care_start_at:gameState.care_start_at || "",
    care_day_advance_mode:gameState.care_day_advance_mode || "",
    care_day_start_hour:gameState.care_day_start_hour ?? ""
  });
  saveState();
  return true;
}
function updateNotificationsOnReturn(){

  if(intervalMinutes !== null && intervalMinutes >= 1){
    const generated = Math.min(MAX_UNREAD_NOTIFICATIONS, Math.floor(intervalMinutes / (NOTIFICATION_INTERVAL_HOURS * 60)));
    if(generated > 0){
      gameState.notification_state.unread = Math.min(MAX_UNREAD_NOTIFICATIONS, (gameState.notification_state.unread || 0) + generated);
      gameState.notification_state.total_generated = (gameState.notification_state.total_generated || 0) + generated;
      gameState.notification_state.max_unread = Math.max(gameState.notification_state.max_unread || 0, gameState.notification_state.unread || 0);
      gameState.notification_state.last_generated_at = nowIso;
      logEvent("in_game_notification_accumulated", {
        notification_generated_count:generated,
        unread_notification_count:gameState.notification_state.unread,
        max_unread_notification_count:gameState.notification_state.max_unread,
        access_interval_minutes:intervalMinutes,
        previous_active_at:prev,
        checked_at:nowIso
      });
    }else{
      logEvent("access_interval", {
        access_interval_minutes:intervalMinutes,
        previous_active_at:prev,
        checked_at:nowIso
      });
    }
  }
  gameState.last_active_at = nowIso;
  saveState();
}

function sendRemoteLog(row){
  if(!LOG_ENDPOINT || !/^https?:\/\//.test(LOG_ENDPOINT)) return;
  if(typeof shouldSendRemoteLog === "function" && !shouldSendRemoteLog(row?.event_type)) return;
  const payload = makeRemotePayload(row);

  // 研究IDはプレゼント到着時に自動発行するため、
  // それ以前のリモート送信対象ログは一度キューに置き、ID発行後にまとめて送ります。
  if(!gameState.research_id && row?.event_type !== "research_id"){
    payload.waiting_for_research_id = true;
    const queue = loadRemoteQueue();
    queue.push(payload);
    saveRemoteQueue(queue.slice(-300));
    return;
  }

  fetch(LOG_ENDPOINT, {
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload),
    keepalive:true
  }).catch(() => {
    const queue = loadRemoteQueue();
    queue.push(payload);
    saveRemoteQueue(queue.slice(-300));
  });
}
function fillResearchIdForQueuedPayload(payload){
  if(!payload || !gameState.research_id) return payload;
  return {
    ...payload,
    research_id: payload.research_id || gameState.research_id,
    participant_id: payload.participant_id || gameState.research_id,
    waiting_for_research_id:false
  };
}
function flushRemoteLogQueue(){
  if(!LOG_ENDPOINT || !/^https?:\/\//.test(LOG_ENDPOINT)) return;
  const queue = loadRemoteQueue()
    .filter(payload => typeof shouldSendRemoteLog !== "function" || shouldSendRemoteLog(payload.event_type || payload.action_type))
    .map(fillResearchIdForQueuedPayload);
  if(!queue.length){ saveRemoteQueue([]); return; }
  saveRemoteQueue([]);
  queue.forEach(payload => {
    fetch(LOG_ENDPOINT, {
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload),
      keepalive:true
    }).catch(() => {
      const retry = loadRemoteQueue();
      retry.push(payload);
      saveRemoteQueue(retry.slice(-300));
    });
  });
}

  return cond.appearance === "different" ? getPairedCharacterId(originalId) : originalId;
}
function getMotionCharacterId(){
  const originalId = gameState.character_id || null;

}

function getOriginalCharacter(){ return CHARACTERS[gameState.character_id] || null; }

function getPersonalityCharacterId(){
  const originalId = gameState.character_id || null;
  if(!originalId) return null;
  if(!isAfterRegeneration()) return originalId;
  const cond = getIdentityCondition();
  // 条件②③では、容姿が変わっても、元の子の動作・言葉づかい・記録の連続性を残す。

function getActionComment(actionType, value=""){

function getCharacterMotionClass(state="happy", extraClass=""){
  // 通常のhappy表示だけに、現在の「動作条件」に対応した動きを付ける。
  // 誕生、睡眠、悲しみ、消失などの場面では、その場面専用の演出を優先する。
  if(state !== "happy") return "";
  if(/birth|fadeout|sleep|sad/.test(String(extraClass))) return "";
  const motionMap = {
    rabbit_pink:"pet-motion-rabbit",
    kangaroo_blue:"pet-motion-kangaroo",
    penguin_yellow:"pet-motion-penguin",
    seal_gray:"pet-motion-seal",

    cat_purple:"pet-motion-cat"
  };

}

}
function buildCareMemoryComment(){
  const pastRows = event_log.filter(r => (r.day || 0) <= 3);
  const petRows = pastRows.filter(r => r.event_type === "petting");
  const foodRows = pastRows.filter(r => r.event_type === "food_choice");
  const outingRows = pastRows.filter(r => r.event_type === "outing_choice");
  const cleanRows = pastRows.filter(r => r.event_type === "poop_clean");
  let chosen = null;
  const cycle = ((gameState.day || 4) + completedActionsCount()) % 4;
  if(cycle === 0 && petRows.length) chosen = {type:"petting", row:petRows[petRows.length-1]};
  else if(cycle === 1 && foodRows.length) chosen = {type:"food", row:foodRows[foodRows.length-1]};
  else if(cycle === 2 && outingRows.length) chosen = {type:"outing", row:outingRows[outingRows.length-1]};
  else if(cleanRows.length) chosen = {type:"clean", row:cleanRows[cleanRows.length-1]};
  else if(foodRows.length) chosen = {type:"food", row:foodRows[foodRows.length-1]};
  else if(outingRows.length) chosen = {type:"outing", row:outingRows[outingRows.length-1]};
  else if(petRows.length) chosen = {type:"petting", row:petRows[petRows.length-1]};

  const personaId = getPersonalityCharacterId() || gameState.character_id;
  const memory = getPersonalityData(personaId)?.memory || {};
  if(!chosen) return addressLine(interpolateLine(memory.fallback || MEMORY_COMMENT_TEMPLATES[gameState.language || "ja"]?.fallback || MEMORY_COMMENT_TEMPLATES.ja.fallback));

  const day = chosen.row.day || 1;
  const details = chosen.row.details || {};
  const value = details.food_choice || details.outing_choice || "";
  const template = memory[chosen.type] || memory.fallback || MEMORY_COMMENT_TEMPLATES[gameState.language || "ja"]?.fallback || MEMORY_COMMENT_TEMPLATES.ja.fallback;
  return addressLine(interpolateLine(template, { day, value }));
}

function tryNextImage(img){
  const list = JSON.parse(img.dataset.fallbacks || "[]");
  const index = Number(img.dataset.fallbackIndex || 0) + 1;
  if(index < list.length){
    img.dataset.fallbackIndex = String(index);
    img.src = list[index];
    return;
  }
  img.classList.add("hidden");
  if(img.nextElementSibling){
    img.nextElementSibling.classList.remove("hidden");
  }
}

  event_log = event_log.map(row => row && !row.research_id ? { ...row, research_id:gameState.research_id } : row);

function initMovingPoopGame(){
  const area = document.getElementById("poopArea");
  const targetEl = document.getElementById("cleanTarget");
  const progressEl = document.getElementById("cleanProgress");
  if(!area || !targetEl || !progressEl) return;
  const target = CLEAN_COLORS[Math.floor(Math.random() * CLEAN_COLORS.length)];
  const decoys = shuffleArray(CLEAN_COLORS.filter(c => c.id !== target.id));
  const colors = shuffleArray([target, target, target, decoys[0], decoys[1], decoys[2], decoys[3] || decoys[0], target]);
  window._poopTargetColor = target.id;
  window._poopTargetLabel = getCleanColorLabel(target);
  window._poopCleaned = 0;
  window._poopMistakes = 0;
  window._poopTargetNeeded = 3;
  targetEl.style.setProperty("--target-color", target.hex);
  targetEl.innerHTML = `<span class="clean-color-dot"></span><span>${esc(getCleanText("target"))}：${esc(getCleanColorLabel(target))}</span>`;
  updateCleanProgress();
  area.innerHTML = colors.map((color, i) => {
    const left = 10 + (i * 13) % 72;
    const top = 13 + ((i * 29) % 70);
    const dx = (i % 2 === 0 ? 1 : -1) * (28 + Math.floor(Math.random()*42));
    const dy = (i % 3 === 0 ? -1 : 1) * (18 + Math.floor(Math.random()*36));
    const dur = (2.0 + Math.random()*1.8).toFixed(2) + "s";
    const delay = (-Math.random()*1.8).toFixed(2) + "s";
    return `<span class="poop moving-poop" data-color="${esc(color.id)}" style="left:${left}%;top:${top}%;--ring:${esc(color.hex)};--dx:${dx}px;--dy:${dy}px;--dur:${dur};animation-delay:${delay}" onclick="cleanPoop(this)">💩</span>`;
  }).join("");
  logEvent("clean_game_start", { day:gameState.day, target_color_id:target.id, target_color_label:getCleanColorLabel(target), total_targets:4 });
}
function updateCleanProgress(){
  const progressEl = document.getElementById("cleanProgress");
  if(!progressEl) return;
  const remain = Math.max(0, (window._poopTargetNeeded || 3) - (window._poopCleaned || 0));
  progressEl.textContent = getCleanText("progress").replace("{n}", remain);
}
function cleanPoop(el){
  const color = el?.dataset?.color || "";
  if(color !== window._poopTargetColor){
    window._poopMistakes = (window._poopMistakes || 0) + 1;
    el.classList.add("wrong");
    showToast(getCleanText("wrong"));
    logEvent("poop_wrong_color", { day:gameState.day, clicked_color_id:color, target_color_id:window._poopTargetColor, mistakes:window._poopMistakes });
    setTimeout(()=>el.classList.remove("wrong"), 360);
    return;
  }
  el.classList.add("cleaned");
  window._poopCleaned = (window._poopCleaned || 0) + 1;
  updateCleanProgress();
  logEvent("poop_correct_color", { day:gameState.day, clicked_color_id:color, target_color_id:window._poopTargetColor, cleaned:window._poopCleaned });
  if(window._poopCleaned >= (window._poopTargetNeeded || 3)){
    const comment = getActionComment("clean") || getCleanText("complete");
    markAction("poop_clean", { day:gameState.day, poop_clean_count:window._poopCleaned, poop_wrong_count:window._poopMistakes || 0, target_color_id:window._poopTargetColor, target_color_label:window._poopTargetLabel, poop_clean_time:now(), character_comment:comment });
    setTimeout(()=>showReaction(comment), 420);
  }
}

  ];

      <div class="admin-section">

        <div class="admin-button-grid">

        </div>

    `;
  }

  if(logPanel){
    const consentRows = event_log.filter(r => r.event_type === "consent_given").length;

      <h2 class="admin-title">ログ確認</h2>

        <button onclick="downloadLog('json')">JSON</button>

      </div>
      <div class="admin-section">
        <h3>到達状況</h3>
        <div class="admin-stat-grid">
          <div class="admin-stat"><small>ID</small><strong>${esc(gameState.research_id || "未設定")}</strong></div>
          <div class="admin-stat"><small>総ログ</small><strong>${esc(event_log.length)}件</strong></div>
          <div class="admin-stat"><small>同意ログ</small><strong>${esc(consentRows)}件</strong></div>
          <div class="admin-stat"><small>アンケート到達</small><strong>${esc(surveyRows ? "あり" : "なし")}</strong></div>

}
function setIdentityCondition(id){
  if(!IDENTITY_CONDITIONS[id]) return;
  gameState.identity_condition_id = id;
  logEvent("dev_set_identity_condition", { identity_condition_id:id, identity_condition_label:IDENTITY_CONDITIONS[id].label, note:"Aコードは管理者確認用。主分析条件はC1〜C5。", ...getResearchConditionForLog() });
  saveState();
  render();
}

function flattenDetails(details){
  return Object.entries(details || {}).map(([k,v]) => `${k}=${String(v).replace(/\n/g," ")}`).join("; ");
}
function csvCell(value){
  return `"${String(value ?? "").replace(/"/g,'""')}"`;
}
function rowToExport(r){

  const consent = gameState.consent_record || {};
  return {
    timestamp: r.timestamp || "",
    received_at: r.timestamp || "",
    participant_id: gameState.research_id || r.research_id || "",
    research_id: r.research_id || "",
    session_id: gameState.start_time || gameState.id_created_time || "",
    condition_id: r.condition_id || "",
    condition_label: r.condition_label || details.condition_label || getResearchConditionForLog().condition_label || "",
    condition_engagement: getResearchConditionForLog().engagement_condition || "",
    condition_framing: getResearchConditionForLog().regeneration_pattern || "",
    engagement_condition: r.engagement_condition || details.engagement_condition || getResearchConditionForLog().engagement_condition || "",

    regeneration_label: r.regeneration_label || details.regeneration_label || getResearchConditionForLog().regeneration_label || "",
    hypothesis_group: r.hypothesis_group || details.hypothesis_group || getResearchConditionForLog().hypothesis_group || "",
    identity_condition_id: details.identity_condition_id || r.identity_condition_id || gameState.identity_condition_id || "",
    character_type: gameState.character_id || r.character_id || "",
    character_id: r.character_id || "",
    display_character_id: details.display_character_id || "",
    motion_character_id: details.motion_character_id || "",
    persona_character_id: details.persona_character_id || "",
    language: gameState.language || "",
    screen_id: r.screen_id || "",
    scene_id: r.screen_id || "",
    day: r.day || "",
    visit_count: gameState.visit_count || "",
    event_type: r.event_type || "",
    action_type: details.action || r.event_type || "",
    affection: details.affection_meter ?? gameState.affection ?? "",
    affection_score: details.affection_meter ?? gameState.affection ?? "",
    choice: details.food_choice || details.outing_choice || "",
    choice_food: details.food_choice || "",
    choice_outing: details.outing_choice || "",
    mini_game_result: details.mini_game_result || details.result || details.mini_game_type || "",
    macaron_color: gameState.macaron_color || "",
    macaron_id: gameState.macaron_id || "",
    character_comment: details.character_comment || details.character_line || "",
    speech_kind: details.speech_kind || "",
    message_id: details.message_id || gameState.last_message_id || "",
    scene_loss_reached: r.event_type === "disappearance_reached" ? 1 : "",
    scene_regeneration_reached: r.event_type === "regeneration_time" ? 1 : "",
    questionnaire_started: r.event_type === "survey_url_clicked" ? 1 : "",
    completed: r.event_type === "survey_url_clicked" ? 1 : "",
    identity_score: details.identity_score || "",
    attachment_mean: details.attachment_mean || "",
    free_text: details.free_text || "",
    consent_given: r.event_type === "consent_given" ? 1 : "",
    consent_time: r.event_type === "consent_given" ? (details.consent_time || consent.consent_time || "") : "",
    consent_text_version: r.event_type === "consent_given" ? (details.consent_text_version || consent.consent_text_version || "") : "",
    consent_item_count: r.event_type === "consent_given" ? (details.consent_item_count || consent.consent_item_count || "") : "",
    consent_all_required_checked: r.event_type === "consent_given" ? (details.all_required_items_checked ? 1 : "") : "",
    consent_research_content_checked: r.event_type === "consent_given" ? (details.research_content_checked ? 1 : "") : "",
    consent_loss_scene_checked: r.event_type === "consent_given" ? (details.loss_scene_checked ? 1 : "") : "",
    consent_regeneration_scene_checked: r.event_type === "consent_given" ? (details.regeneration_scene_checked ? 1 : "") : "",
    consent_distress_risk_checked: r.event_type === "consent_given" ? (details.distress_risk_checked ? 1 : "") : "",
    consent_stop_anytime_checked: r.event_type === "consent_given" ? (details.stop_anytime_checked ? 1 : "") : "",
    consent_nonidentifiable_data_checked: r.event_type === "consent_given" ? (details.nonidentifiable_data_checked ? 1 : "") : "",
    explanation_viewed: r.event_type === "consent_given" ? (details.explanation_viewed ? 1 : "") : "",
    explanation_time: r.event_type === "consent_given" ? (details.explanation_time || "") : "",
    player_name_entered: !!gameState.player_name,

  };
}
function downloadLog(type){
  const base = (gameState.research_id || "no_id").replace(/[^a-zA-Z0-9_-]/g,"_");
  let content, mime, ext;
  if(type === "json") { content = JSON.stringify({ gameState, event_log }, null, 2); mime="application/json"; ext="json"; }
  else {
    const header = [
      "timestamp","received_at","participant_id","research_id","session_id",
      "condition_id","condition_label","condition_engagement","condition_framing","engagement_condition","regeneration_pattern","regeneration_label","hypothesis_group","appearance_pattern","personality_pattern","name_pattern","memory_pattern","change_appearance","change_personality","change_name","change_memory","identity_condition_id",
      "character_type","character_id","display_character_id","motion_character_id","persona_character_id","language","screen_id","scene_id","day","visit_count","event_type","action_type",
      "affection","affection_score","choice","choice_food","choice_outing","mini_game_result","macaron_color","macaron_id","character_comment","speech_kind","message_id",
      "scene_loss_reached","scene_regeneration_reached","questionnaire_started","completed","identity_score","attachment_mean","free_text",
      "consent_given","consent_time","consent_text_version","consent_item_count","consent_all_required_checked","consent_research_content_checked","consent_loss_scene_checked","consent_regeneration_scene_checked","consent_distress_risk_checked","consent_stop_anytime_checked","consent_nonidentifiable_data_checked","explanation_viewed","explanation_time",
      "player_name_entered","player_name_length","character_name_entered","character_name_length","optional_continuation",
      "unread_notification_count","total_notification_generated","care_start_at","care_start_mode","care_day_advance_mode","care_day_start_hour","care_day_start_minute","user_agent","details"
    ];
    const rows = event_log.map(r => {
      const exportRow = rowToExport(r);
      return header.map(h => csvCell(exportRow[h])).join(",");
    });
    content = header.join(",") + "\n" + rows.join("\n"); mime="text/csv"; ext="csv";
  }
  const blob = new Blob([content], { type:mime + ";charset=utf-8" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `osewa_${base}_log.${ext}`; a.click(); URL.revokeObjectURL(a.href);
}
function showLogPreview(){
  if(ADMIN_MODE){
    updateDevPanel();
    showToast("ログを更新しました。");
    return;
  }
  screenShell(`<h2>${esc(t("logPreview"))}</h2><details open><summary>gameState</summary><div class="mono">${esc(JSON.stringify(gameState,null,2))}</div></details><details open><summary>event_log</summary><div class="mono">${esc(JSON.stringify(event_log.slice(-30),null,2))}</div></details><div class="row right"><button class="primary" onclick="render()">${esc(t("returnHome"))}</button></div>`);
}
function resetGame(){
  const lang = gameState.language || "ja";
  const promptText = lang === "en"
    ? "Enter the reset password."
    : lang === "zh-CN"
      ? "请输入重置密码。"
      : "最初からやり直すには、リセット用パスワードを入力してください。";
  const wrongText = lang === "en"
    ? "Incorrect password."
    : lang === "zh-CN"
      ? "密码不正确。"
      : "パスワードが違います。";
  const confirmText = lang === "en"
    ? "All saved progress and local logs will be deleted. Start from the beginning?"
    : lang === "zh-CN"
      ? "保存的进度和本地日志会被删除。要从头开始吗？"
      : "保存された進行状況と、この端末内のログを消して、最初から始めますか？";
  const doneText = lang === "en"
    ? "Reset complete."
    : lang === "zh-CN"
      ? "已重置。"
      : "リセットしました。";

  const input = prompt(promptText);
  if(input === null) return;
  if(String(input).trim() !== RESET_PASSWORD){
    showToast(wrongText);
    return;
  }
  if(!confirm(confirmText)) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(LOG_KEY);
  localStorage.removeItem(REMOTE_LOG_QUEUE_KEY);
  gameState = defaultState();
  event_log = [];
  saveState();
  saveLog();
  showToast(doneText);
  render();
}

window.addEventListener("beforeunload", () => {
  gameState.last_active_at = now();
  saveState();
});
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "hidden"){
    gameState.last_active_at = now();
    saveState();
  }
});

// 初期化：研究ID入力画面は使わず、同意前に本編へ進めないよう、状態を確認して画面を補正します。

(function init(){
  if(gameState.screen === "02_research_id") gameState.screen = "02b_player_name";
  if(!gameState.language) gameState.screen = "01_language";
  else if(gameState.player_name === undefined) gameState.screen = "02b_player_name";
  else if(!gameState.explanation_viewed) gameState.screen = "03_explanation";
  else if(!gameState.consent) gameState.screen = "04_consent";
  else if(!gameState.care_start_at) gameState.screen = "04b_care_time";
  else if(isCareStartInFuture() && !gameState.character_id) gameState.screen = "06a_schedule_wait";
  else if(!gameState.character_id) gameState.screen = "05_macaron_select";
  else if(gameState.character_id && !gameState.birth_time && !["06_birth_wait","08_birth"].includes(gameState.screen)) gameState.screen = "06_birth_wait";
  else if(gameState.birth_time && !gameState.initial_petting_done && !gameState.character_name && !["08b_first_petting","05b_character_name"].includes(gameState.screen)) gameState.screen = "08b_first_petting";
  flushRemoteLogQueue();
  updateNotificationsOnReturn();
  autoAdvanceIfNewDay();
  render();
})();
